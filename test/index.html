<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PewPew — overlay test harness</title>
    <link rel="stylesheet" href="../renderer/style.css" />
    <style>
      /* Fake "code behind the overlay" so the transparent game can be seen
         floating on top — this stands in for your editor in a real browser. */
      html,
      body {
        background: #0b0e14;
      }
      #codebg {
        position: fixed;
        inset: 0;
        z-index: -1;
        margin: 0;
        padding: 22px 26px;
        color: #3f4d63;
        font: 13px/1.55 "Courier New", monospace;
        white-space: pre-wrap;
        overflow: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <pre id="codebg"></pre>

    <canvas id="game"></canvas>
    <div id="dragsurface"></div>
    <div id="revealzone"></div>

    <div id="frame" aria-hidden="true">
      <i class="grip" data-edge="nw"></i>
      <i class="grip" data-edge="n"></i>
      <i class="grip" data-edge="ne"></i>
      <i class="grip" data-edge="e"></i>
      <i class="grip" data-edge="se"></i>
      <i class="grip" data-edge="s"></i>
      <i class="grip" data-edge="sw"></i>
      <i class="grip" data-edge="w"></i>
    </div>

    <div id="hud" class="chrome">
      <div id="score">SCORE 0</div>
      <div id="hiscore">HI 0</div>
      <div id="lives"></div>
      <div id="mode">PLAY</div>
      <div id="scorepop"></div>
    </div>

    <div id="hints" class="chrome">
      <span><b>&larr; &rarr;</b> turn</span>
      <span><b>&uarr;</b> thrust</span>
      <span><b>SPACE</b> fire</span>
      <span><b>drag</b> move</span>
      <span><b>dbl-click</b> fullscreen</span>
    </div>

    <div id="controls">
      <button id="btn-quit" class="ic" title="Quit PewPew">
        <svg viewBox="0 0 24 24"><path d="M5 5 L19 19 M19 5 L5 19" /></svg>
      </button>
      <button id="btn-through" class="ic" title="Toggle click-through">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" fill="none" />
          <path d="M12 3 A9 9 0 0 0 12 21 Z" class="fill" />
        </svg>
      </button>
      <button id="btn-mode" class="ic" title="Toggle Play / Ambient">
        <svg viewBox="0 0 24 24">
          <path d="M4 9 H18 M14 5 L18 9 L14 13" />
          <path d="M20 15 H6 M10 11 L6 15 L10 19" />
        </svg>
      </button>
      <button id="btn-pause" class="ic" title="Pause / resume">
        <svg viewBox="0 0 24 24">
          <rect x="6" y="5" width="4" height="14" rx="1" class="fill" />
          <rect x="14" y="5" width="4" height="14" rx="1" class="fill" />
        </svg>
      </button>
      <button id="btn-color" class="ic" title="Change color">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" class="fill" /></svg>
      </button>
    </div>

    <div id="banner" class="chrome hidden">
      <div id="banner-title">PEWPEW</div>
      <div id="banner-sub">PRESS SPACE / FIRE TO START</div>
    </div>

    <script>
      const lines = [
        'const overlay = new BrowserWindow({ transparent: true, frame: false });',
        'overlay.setIgnoreMouseEvents(true, { forward: true });',
        'function update(dt) { ship.x += ship.vx * dt; wrap(ship); }',
        'for (const a of asteroids) { a.x += a.vx * dt; a.a += a.spin * dt; }',
        'if (Math.hypot(a.x - b.x, a.y - b.y) < a.r) splitAsteroid(j);',
        'globalShortcut.register("CommandOrControl+Shift+O", toggleThrough);',
        'ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; drawAsteroid(a);',
        'requestAnimationFrame(loop); // 60fps render of the white wireframe',
      ];
      let out = "";
      for (let i = 0; i < 60; i++) {
        out += String(i + 1).padStart(3, " ") + "  " + lines[i % lines.length] + "\n";
      }
      document.getElementById("codebg").textContent = out;
    </script>
    <script type="module" src="../renderer/src/main.js"></script>
  </body>
</html>
